<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python 作品</title>

    <style>
        body {
            margin: 0;
            font-family: "Noto Sans TC", sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #ffffff);
        }

        header {
            background-color: #1565c0;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        header p {
            margin-top: 10px;
            font-size: 16px;
            opacity: 0.9;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .card a {
            text-decoration: none;
            color: #1565c0;
            font-weight: bold;
            font-size: 18px;
        }

        .card p {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>

<body>

<header>
    <h1>文化資管 山口慈元</h1>
    <p>Python ｜作品</p>
</header>

<div class="container">
    <div class="card-grid">


        <div class="card">
            <a href="/ask">🤖 字典應用</a>
            <p>中韓對照。</p>
        </div>

    </div>
</div>

<footer>
    © 2026 山口慈元 作品
</footer>

</body>
</html>
